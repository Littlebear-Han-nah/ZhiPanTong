<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR 智能资产识别</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .video-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            background-color: #000;
            position: relative;
        }
        /* 这是显示摄像头画面的核心元素 */
        #videoStream {
            width: 100%;
            height: auto;
            display: block;
        }
        .control-panel {
            margin-top: 20px;
            text-align: center;
        }
        .mode-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">智能资产管理系统</a>
        </div>
    </nav>

    <div class="container">
        <h2 class="text-center mb-4">AR 实时资产识别</h2>

        <!-- 视频显示区域 -->
        <div class="video-container">
            <!-- img 标签的 src 指向 Flask 的视频流路由 -->
            <img id="videoStream"
                 src="{{ url_for('video_feed') }}"
                 onerror="this.style.display='none'; setTimeout(() => { this.src = this.src; this.style.display='block'; }, 1000);">
            <div class="mode-badge" id="modeDisplay">当前模式: 扫码识别</div>
        </div>

        <!-- 控制按钮 -->
        <div class="control-panel">
            <div class="btn-group" role="group">
                <button type="button" class="btn btn-success btn-lg" onclick="switchMode('qr')">
                    <i class="bi bi-qr-code"></i> 扫码识别 (QR/Barcode)
                </button>
                <button type="button" class="btn btn-warning btn-lg" onclick="switchMode('yolo')">
                    <i class="bi bi-box-seam"></i> 物体检测 (YOLO AI)
                </button>
            </div>
            <p class="text-muted mt-3">点击按钮切换识别引擎。识别结果将直接叠加在视频画面中。</p>
        </div>

        <!-- 显示简单的数据库关联提示 -->
        <div class="alert alert-info mt-4">
            <h5>测试指南：</h5>
            <ul>
                <li><strong>扫码模式：</strong>请生成内容为 "RFID001" 或 "RFID002" 的二维码对着摄像头。</li>
                <li><strong>物体模式：</strong>将摄像头对准人、笔记本电脑、鼠标或水杯，AI将自动框选。</li>
            </ul>
        </div>
    </div>

    <script>
        function switchMode(mode) {
            fetch(`/api/set_mode/${mode}`, { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if(data.status === 'success') {
                        const text = mode === 'qr' ? '当前模式: 扫码识别' : '当前模式: 物体检测';
                        document.getElementById('modeDisplay').innerText = text;
                        // 视觉反馈按钮状态（可选）
                    }
                })
                .catch(error => console.error('Error:', error));
        }
    </script>
</body>
</html>
